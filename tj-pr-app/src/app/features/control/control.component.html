<div class="container-fluid py-4">
    <form [formGroup]="form">

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card card-theme shadow-sm border-0 rounded-4 p-4">
                    <div class="d-flex align-items-center mb-3">
                        <div class="me-2 p-2 rounded-3 section-icon icon-blue">
                            <i class="bi bi-person"></i>
                        </div>
                        <h5 class="fw-semibold mb-0">Informações Pessoais</h5>
                    </div>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">
                                Nome Completo <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" formControlName="nome"
                                placeholder="Digite o nome completo">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">
                                CPF <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" formControlName="cpf" placeholder="000.000.000-00">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">RG</label>
                            <input type="text" class="form-control" formControlName="rg">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">OAB</label>
                            <input type="text" class="form-control" formControlName="oab">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">UF</label>
                            <input type="text" class="form-control" formControlName="uf">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Telefone</label>
                            <input type="text" class="form-control" formControlName="telefone"
                                placeholder="(00) 00000-0000">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">E-mail</label>
                            <input type="email" class="form-control" formControlName="email"
                                placeholder="email@exemplo.com">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Setor/Departamento</label>
                            <input type="text" class="form-control" formControlName="setor">
                        </div>
                    </div>
                </div>

                <div class="card card-theme shadow-sm border-0 rounded-4 p-4 mt-4">
                    <div class="d-flex align-items-center mb-3">
                        <div class="me-2 p-2 rounded-3 section-icon icon-purple">
                            <i class="bi bi-shield-lock"></i>
                        </div>
                        <h5 class="fw-semibold mb-0">Dados de Acesso Hikcentral</h5>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">
                                Número do Cartão <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" formControlName="numeroCartao" placeholder="000000">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Tipo de Cartão</label>
                            <select class="form-select" formControlName="tipoCartao">
                                <option value="">Selecione</option>
                                <option value="normal">Normal</option>
                                <option value="visitante">Visitante</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Tipo de Movimentação</label>
                            <select class="form-select" formControlName="tipoMovimentacao">
                                <option value="">Selecione</option>
                                <option value="entrada">Entrada</option>
                                <option value="saida">Saída</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Login de Rede</label>
                            <input type="text" class="form-control" formControlName="loginRede">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Número de Segurança</label>
                            <input type="text" class="form-control" formControlName="numeroSeguranca">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Destino</label>
                            <select class="form-select" formControlName="destino">
                                <option value="">Selecione o destino</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card card-theme shadow-sm border-0 rounded-4 p-4 h-100 d-flex flex-column">
                    <div class="d-flex align-items-center mb-3">
                        <div class="me-2 p-2 rounded-3 section-icon icon-green">
                            <i class="bi bi-camera"></i>
                        </div>
                        <h5 class="fw-semibold mb-0">Foto</h5>
                    </div>
                    <div
                        class="flex-grow-1 d-flex align-items-center justify-content-center rounded-4 mb-3 photo-preview">
                        <ng-container *ngIf="fotoPreview; else semFoto">
                            <img [src]="fotoPreview" class="img-fluid rounded-3 photo-img">
                        </ng-container>
                        <ng-template #semFoto>
                            <div class="text-center opacity-75">
                                <i class="bi bi-camera fs-1"></i>
                                <p class="mt-2 mb-0">Nenhuma foto capturada</p>
                            </div>
                        </ng-template>
                    </div>
                    <button type="button" class="btn btn-green w-100 text-white" (click)="fileInput.click()">
                        <i class="bi bi-camera me-2"></i>
                        Capturar Foto
                    </button>
                    <input #fileInput type="file" hidden accept="image/*" (change)="onFileSelected($event)">
                </div>
            </div>
        </div>

        <div class="card card-theme shadow-sm border-0 rounded-4 p-4 mt-4">
            <div class="d-flex align-items-center mb-3">
                <div class="me-2 p-2 rounded-3 section-icon icon-dark">
                    <i class="bi bi-file-earmark-text"></i>
                </div>
                <h5 class="fw-semibold mb-0">Observações</h5>
            </div>
            <textarea class="form-control textarea-custom" formControlName="observacoes" rows="3"
                placeholder="Adicione observações relevantes sobre o acesso...">
            </textarea>
        </div>

        <div class="d-flex justify-content-end align-items-center mt-4 gap-3 flex-wrap">
            <button type="submit" class="btn btn-gradient px-5 py-3 text-white fw-semibold shadow-sm">
                <i class="bi bi-check-circle me-2"></i>
                Registrar Acesso
            </button>
            <button type="button" class="btn btn-outline-theme px-4 py-3" (click)="form.reset()">

                Limpar Formulário
            </button>
        </div>
    </form>
</div>
