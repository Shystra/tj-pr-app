<nav class="navbar navbar-expand-lg navbar-dark navbar-iris w-100" [ngClass]="{ 'navbar-scrolled': isScrolled }">
  <div class="container-fluid">
    <a class="navbar-brand ms-5 me-5 d-none d-lg-block" href="/home">
      <img [src]="isDarkTheme ? '/assets/images/logo.svg' : '/assets/images/0190.png'" alt="Logo" height="50">
    </a>
    <a class="navbar-brand ms-3 d-lg-none" href="/home">
      <img [src]="isDarkTheme ? '/assets/images/logo.svg' : '/assets/images/0190.png'" alt="Logo" height="50">
    </a>
    <div class="d-flex align-items-center ms-auto me-4">
      <div>
        <a class="cursor-pointer" [matMenuTriggerFor]="languageMenu">
          <mat-icon class="me-4">translate</mat-icon>
        </a>
        <mat-menu #languageMenu="matMenu">
          <button mat-menu-item (click)="toggleLanguageHeader('pt-BR')">
            🇧🇷 <span class="ms-2">Português (Brasil)</span>
          </button>
          <button mat-menu-item (click)="toggleLanguageHeader('pt-PT')">
            🇵🇹 <span class="ms-2">Português (Portugal)</span>
          </button>
          <button mat-menu-item (click)="toggleLanguageHeader('en-US')">
            🇺🇸 <span class="ms-2">English (US)</span>
          </button>
          <button mat-menu-item (click)="toggleLanguageHeader('es-ES')">
            🇪🇸 <span class="ms-2">Español</span>
          </button>
        </mat-menu>
      </div>
      <mat-icon [ngClass]="{
          'theme-icon-dark': isDarkTheme,
          'theme-icon-light': !isDarkTheme
        }" class="me-2" role="button" (click)="toggleTheme()">
        {{ isDarkTheme ? 'dark_mode' : 'wb_sunny' }}
      </mat-icon>
    </div>
  </div>
</nav>
