<nav class="navbar navbar-expand-lg navbar-dark navbar-tj w-100" [ngClass]="{ 'navbar-scrolled': isScrolled }">
  <div class="container-fluid">
    <a class="navbar-brand ms-5 me-5 d-none d-lg-block" href="/home">
      <img [src]="isDarkTheme ? '/assets/images/logo_tj.jpeg' : '/assets/images/logo_tj.jpeg'" alt="Logo" height="50" width="45" >
    </a>
    <a class="navbar-brand ms-3 d-lg-none" href="/home">
      <img [src]="isDarkTheme ? '/assets/images/logo_tj.jpeg' : '/assets/images/logo_tj.jpeg'" alt="Logo" height="50" width="45" >
    </a>
    <div class="d-flex align-items-center ms-auto me-4 gap-3">
      <div class="header-card card-success">
        <div class="header-card-icon">
          <mat-icon>monitor_heart</mat-icon>
        </div>
        <div class="header-card-content">
          <span class="header-card-label">Acessos Ativos</span>
          <span class="header-card-value">12</span>
        </div>
      </div>
      <div class="header-card card-primary">
        <div class="header-card-icon">
          <mat-icon>calendar_today</mat-icon>
        </div>
        <div class="header-card-content">
          <span class="header-card-label">Hoje</span>
          <span class="header-card-value">89</span>
        </div>
      </div>
      <div>
        <a class="cursor-pointer" [matMenuTriggerFor]="languageMenu">
          <mat-icon class="me-3">translate</mat-icon>
        </a>
        <mat-menu #languageMenu="matMenu">
          <button mat-menu-item (click)="toggleLanguageHeader('pt-BR')">
            🇧🇷 <span class="ms-2">Português (Brasil)</span>
          </button>
          <button mat-menu-item (click)="toggleLanguageHeader('pt-PT')">
            🇵🇹 <span class="ms-2">Português (Portugal)</span>
          </button>
          <button mat-menu-item (click)="toggleLanguageHeader('en-US')">
            🇺🇸 <span class="ms-2">English (US)</span>
          </button>
          <button mat-menu-item (click)="toggleLanguageHeader('es-ES')">
            🇪🇸 <span class="ms-2">Español</span>
          </button>
        </mat-menu>
      </div>
      <mat-icon class="me-2 cursor-pointer" (click)="toggleTheme()">
        {{ isDarkTheme ? 'dark_mode' : 'wb_sunny' }}
      </mat-icon>
    </div>
  </div>
</nav>
