<nav class="navbar navbar-expand-lg navbar-dark navbar-tj w-100" [ngClass]="{ 'navbar-scrolled': isScrolled }">
  <div class="container-fluid">
    <a class="navbar-brand ms-5 me-5 d-none d-lg-block" href="/home">
      <img [src]="isDarkTheme ? '/assets/images/logo_tj.jpeg' : '/assets/images/logo_tj.jpeg'" alt="Logo" height="50"
        width="45">
    </a>
    <a class="navbar-brand ms-3 d-lg-none" href="/home">
      <img [src]="isDarkTheme ? '/assets/images/logo_tj.jpeg' : '/assets/images/logo_tj.jpeg'" alt="Logo" height="50"
        width="45">
    </a>

    <div class="d-flex align-items-center ms-auto me-4 gap-3">

      <div class="header-card card-success">
        <div class="header-card-icon">
          <mat-icon>monitor_heart</mat-icon>
        </div>
        <div class="header-card-content">
          <span class="header-card-label">Acessos Ativos</span>
          <span class="header-card-value">
            @if (isLoadingStats) {
            <span class="spinner-border spinner-border-sm"></span>
            } @else {
            {{ acessosAtivos }}
            }
          </span>
        </div>
      </div>

      <div class="header-card card-primary">
        <div class="header-card-icon">
          <mat-icon>calendar_today</mat-icon>
        </div>
        <div class="header-card-content">
          <span class="header-card-label">Hoje</span>
          <span class="header-card-value">
            @if (isLoadingStats) {
            <span class="spinner-border spinner-border-sm"></span>
            } @else {
            {{ acessosHoje }}
            }
          </span>
        </div>
      </div>

      <mat-icon class="me-2 cursor-pointer" (click)="toggleTheme()">
        {{ isDarkTheme ? 'dark_mode' : 'wb_sunny' }}
      </mat-icon>
    </div>
  </div>
</nav>
